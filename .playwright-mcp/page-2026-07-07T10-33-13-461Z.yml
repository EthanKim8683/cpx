                - img "Neapolis University Pafos" [ref=e339]
              - paragraph [ref=e340]: Hello Codeforces!
              - paragraph [ref=e341]:
                - text: The series of Educational Rounds continues thanks to the support of the
                - link "Neapolis University Pafos" [ref=e342] [cursor=pointer]:
                  - /url: https://www.nup.ac.cy/
                - text: . They offer a BSc in Computer Science and AI with
                - link "JetBrains Scholarships" [ref=e343] [cursor=pointer]:
                  - /url: https://lp.jetbrains.com/academy/csai-program/
                - text: . Gain cutting-edge skills in AI and machine learning, preparing you for high-demand tech careers. Limited scholarships available — don't miss your chance to study in Europe for free!
              - paragraph [ref=e344]:
                - link "Educational Codeforces Round 192 (Rated for Div. 2)" [ref=e345] [cursor=pointer]:
                  - /url: /contest/2242
                - text: will start on
                - link "Monday, July 6, 2026 at 07:35UTC-7" [ref=e346] [cursor=pointer]:
                  - /url: https://www.timeanddate.com/worldclock/fixedtime.html?day=6&month=7&year=2026&hour=17&min=35&sec=0&p1=166
                  - text: Monday, July 6, 2026 at 07:35
                  - superscript [ref=e347]: UTC-7
                - text: .
              - paragraph [ref=e348]:
                - text: This round will be
                - strong [ref=e349]: rated for the participants with rating lower than 2100
                - text: . It will be held on extended ICPC rules. The penalty for each incorrect submission until the submission with a full solution is 10 minutes. After the end of the contest, you will have 12 hours to hack any solution you want. You will have access to copy any solution and test it locally.
              - paragraph [ref=e350]:
                - text: You will be given
                - strong [ref=e351]: 6 problems
                - text: and
                - strong [ref=e352]: 2 hours
                - text: to solve them.
              - paragraph [ref=e353]:
                - text: The problems were proposed and prepared by Maxim
                - link "FelixArg" [ref=e354] [cursor=pointer]:
                  - /url: /profile/FelixArg
                - text: Novotochinov, Adilbek
                - link "adedalic" [ref=e355] [cursor=pointer]:
                  - /url: /profile/adedalic
                - text: Dalabaev, Roman
                - link "Roms" [ref=e356] [cursor=pointer]:
                  - /url: /profile/Roms
                - text: Glazov and me. We would like to express our gratitude to
                - link "MikeMirzayanov" [ref=e357] [cursor=pointer]:
                  - /url: /profile/MikeMirzayanov
                - text: for creating Codeforces and Polygon — without them, these rounds would not be possible.
              - paragraph [ref=e358]:
                - text: "Also, big shoutout to the round testers:"
                - link "shnirelman" [ref=e359] [cursor=pointer]:
                  - /url: /profile/shnirelman
                - text: ","
                - link "Brovko" [ref=e360] [cursor=pointer]:
