version: "2"
run:
  build-tags:
    - integration
  tests: true
linters:
  default: none
  enable:
    # --- Performance & Correctness ---
    - bodyclose
    - errcheck
    - errorlint
    - gosec
    - govet
    - ineffassign
    - makezero
    - perfsprint
    - staticcheck
    - unused
    - copyloopvar
    - reassign
    - wastedassign

    # --- Style & Maintainability ---
    - decorder
    - goconst
    - gocritic
    - misspell
    - nolintlint
    - predeclared
    - revive
    - unconvert
    - usestdlibvars
    - whitespace
    - ireturn
    - errname
    - tagalign

    # --- Test Quality ---
    - paralleltest
    - tparallel
    - testifylint
    - thelper
    - usetesting

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    goconst:
      min-len: 3
      min-occurrences: 3
    govet:
      disable:
        - fieldalignment
      enable-all: true
    nolintlint:
      require-explanation: true
      require-specific: true
    revive:
      rules:
        - name: package-comments
          severity: warning
        - name: exported
          severity: warning
        - name: context-as-argument
        - name: context-keys-type
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: var-naming
        - name: increment-decrement
        - name: range
  exclusions:
    generated: lax
    rules:
      # Exclude goconst from test files since duplicate string literals are extremely common in tests
      - linters:
          - goconst
        path: .*_test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-same-issues: 0
formatters:
  enable:
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
