version: "2"

linters:
  default: standard
  enable:
    - revive
    - thelper
    - testifylint
    - forbidigo
    - testableexamples
    - depguard
    - gocritic
    - misspell
  settings:
    gocritic:
      disabled-checks:
        - exitAfterDefer
    revive:
      rules:
        - name: exported
        - name: package-comments
    depguard:
      rules:
        tests-no-gocmp:
          files:
            - $test
          list-mode: lax
          deny:
            - pkg: github.com/google/go-cmp
              desc: use testify assertions; see docs/adr/0004-testing-frameworks.md
    forbidigo:
      analyze-types: true
      forbid:
        - pattern: ^reflect\.DeepEqual$
          msg: use testify assertions; see docs/adr/0004-testing-frameworks.md
  exclusions:
    presets:
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path-except: '_test\.go'
        linters:
          - testifylint
          - forbidigo
          - depguard

run:
  timeout: 5m

formatters:
  enable:
    - goimports
