version: "2"
run:
  build-tags:
    - integration
  tests: true
linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - goconst
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - nolintlint
    - paralleltest
    - revive
    - staticcheck
    - tparallel
    - unconvert
    - unused
    - whitespace
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    goconst:
      min-len: 3
      min-occurrences: 3
    govet:
      disable:
        - fieldalignment
      enable-all: true
    nolintlint:
      require-explanation: true
      require-specific: true
    revive:
      rules:
        - name: package-comments
          severity: warning
        - name: exported
          severity: warning
        - name: context-as-argument
        - name: context-keys-type
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: var-naming
        - name: increment-decrement
        - name: range
  exclusions:
    generated: lax
    rules:
      - linters:
          - goconst
        path: .*_test\.go
      - linters:
          - goconst
        path: .*translate\.go
      - linters:
          - gosec
        text: .*(G204|G301|G304|G306).*
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-same-issues: 0
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
